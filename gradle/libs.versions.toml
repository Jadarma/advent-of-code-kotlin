[versions]
kotlin = "1.4.32"

[libraries]
kotlin-reflect = { module = "org.jetbrains.kotlin:kotlin-reflect", version.ref = "kotlin" }
kotlin-serializationJson = "org.jetbrains.kotlinx:kotlinx-serialization-json:1.1.0"

clikt = "com.github.ajalt.clikt:clikt:3.1.0"
