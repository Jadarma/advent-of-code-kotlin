name: 'Build'

# Action Dependency Pins:
# actions/checkout            - de0fac2e4500dabe0009e67214ff5f5447ce83dd - v6.0.2 - https://github.com/actions/checkout/releases
# actions/setup-java          - be666c2fcd27ec809703dec50e508c2fdc7f6654 - v5.2.0 - https://github.com/actions/setup-java/releases
# actions/upload-artifact     - bbbca2ddaa5d8feaa63e36b76fdaad77386f024f - v7.0.0 - https://github.com/actions/upload-artifact/releases
# gradle/actions/setup-gradle - 0723195856401067f7a2779048b490ace7a47d7c - v5.0.2 - https://github.com/gradle/actions/releases

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: 'Setup Java'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '21'
          distribution: 'adopt'
      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c
      - name: 'Build'
        run: ./gradlew build
      - name: 'Upload Build Reports'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: always()
        with:
          name: 'build-reports'
          path: 'aockt-*/build/reports'
